model:
  name: bert-base-multilingual-cased
  num_labels: 3
  max_length: 128

training:
  per_device_train_batch_size: 32
  learning_rate: 2.0e-5
  num_train_epochs: 3
  warmup_ratio: 0.1
  weight_decay: 0.01
  output_dir: models/bert-sentiment

data:
  dataset: yelp_review_full
  test_size: 0.15
  seed: 42

